<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESL Pro Tool - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 350px; text-align: center; }
        .logo { font-weight: 800; font-size: 24px; color: #2563eb; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        #error-msg { color: #ef4444; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">ESL PRO TOOL</div>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleLogin()">Login</button>
        <p id="error-msg">Invalid username or password</p>
    </div>

    <script>
       const API_URL = "https://script.google.com/macros/s/AKfycbzUjqLmVS0BitOmvONNOBkct1Fnp--Jp63cPhJQmjB_RQTLMVPQhmtBMhMI_zcGRtIv/exec";

function handleLogin() {
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value.trim();
    const error = document.getElementById('error-msg');
    const btn = document.querySelector('button');

    if (!user || !pass) {
        error.innerText = "Please enter both fields";
        error.style.display = 'block';
        return;
    }

    btn.innerText = "Checking...";
    btn.disabled = true;

    // 1. Create a unique callback function name
    const callbackName = 'google_callback_' + Math.round(Math.random() * 1000000);

    // 2. Define what happens when Google replies
    window[callbackName] = function(result) {
        if (result.status === "success") {
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('teacherName', result.name);
            window.location.href = "index.html";
        } else {
            error.innerText = "Invalid username or password";
            error.style.display = 'block';
            btn.innerText = "Login";
            btn.disabled = false;
        }
        // Cleanup
        document.body.removeChild(script);
        delete window[callbackName];
    };

    // 3. Create the "Script" tag to bypass CORS
    const script = document.createElement('script');
    script.src = `${API_URL}?action=login&username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}&callback=${callbackName}`;
    document.body.appendChild(script);

    // Handle timeout/error
    script.onerror = () => {
        error.innerText = "Connection failed. Check Deployment URL.";
        error.style.display = 'block';
        btn.innerText = "Login";
        btn.disabled = false;
    };
}
    </script>
</body>
</html>
